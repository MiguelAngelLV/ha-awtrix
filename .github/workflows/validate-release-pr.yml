name: Validate Release PR

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - main

jobs:
  validate:
    if: contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR title format
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          
          if [[ ! "$PR_TITLE" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ The PR title must be a version number (e.g.: v2.3.1)"
            echo "Current title: $PR_TITLE"
            exit 1
          fi
          
          echo "✅ Valid PR title: $PR_TITLE"

      - name: Get versions from files
        id: versions
        run: |
          MANIFEST_VERSION=$(jq -r '.version' custom_components/awtrix/manifest.json)
          PYPROJECT_VERSION=$(grep '^version = ' pyproject.toml | cut -d'"' -f2)
          PR_VERSION="${{ github.event.pull_request.title }}"
          PR_VERSION="${PR_VERSION#v}"
          
          echo "manifest=$MANIFEST_VERSION" >> $GITHUB_OUTPUT
          echo "pyproject=$PYPROJECT_VERSION" >> $GITHUB_OUTPUT
          echo "pr=$PR_VERSION" >> $GITHUB_OUTPUT
          
          echo "Manifest version: $MANIFEST_VERSION"
          echo "Pyproject version: $PYPROJECT_VERSION"
          echo "PR version: $PR_VERSION"

      - name: Validate version consistency
        run: |
          MANIFEST_VERSION="${{ steps.versions.outputs.manifest }}"
          PYPROJECT_VERSION="${{ steps.versions.outputs.pyproject }}"
          PR_VERSION="${{ steps.versions.outputs.pr }}"
          
          ERRORS=0
          
          if [ "$MANIFEST_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "❌ Versions in manifest.json ($MANIFEST_VERSION) and pyproject.toml ($PYPROJECT_VERSION) do not match"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ Versions in manifest.json and pyproject.toml match: $MANIFEST_VERSION"
          fi
          
          if [ "$MANIFEST_VERSION" != "$PR_VERSION" ]; then
            echo "❌ Version in files ($MANIFEST_VERSION) does not match PR title ($PR_VERSION)"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ Version in files matches PR title: $PR_VERSION"
          fi
          
          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "❌ Found $ERRORS error(s) in version validation"
            exit 1
          fi
          
          echo ""
          echo "✅ All version validations passed successfully"

      - name: Check for version increment
        run: |
          PR_VERSION="${{ steps.versions.outputs.pr }}"
          
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LAST_VERSION="${LAST_TAG#v}"
          
          echo "Latest version: $LAST_VERSION"
          echo "New version: $PR_VERSION"
          
          version_gt() {
              test "$(printf '%s\n' "$@" | sort -V | head -n 1)" != "$1"
          }
          
          if version_gt "$PR_VERSION" "$LAST_VERSION"; then
            echo "✅ New version ($PR_VERSION) is greater than latest ($LAST_VERSION)"
          else
            echo "❌ New version ($PR_VERSION) must be greater than latest ($LAST_VERSION)"
            exit 1
          fi

      - name: Validate changed files
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          if ! echo "$CHANGED_FILES" | grep -q "custom_components/awtrix/manifest.json"; then
            echo "❌ manifest.json must be modified in a release PR"
            exit 1
          fi
          
          if ! echo "$CHANGED_FILES" | grep -q "pyproject.toml"; then
            echo "❌ pyproject.toml must be modified in a release PR"
            exit 1
          fi
          
          echo "✅ Required files were modified"

      - name: Comment validation results
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.versions.outputs.pr }}';
            const comment = `## ✅ Release Validation Successful
            
            The release PR for version **v${version}** has passed all validations:
            
            - ✅ Correct title format
            - ✅ Consistent versions across all files
            - ✅ Version increment validated correctly
            - ✅ Required files modified
            
            **Version**: v${version}
            **Manifest**: ${version}
            **Pyproject**: ${version}
            
            The PR is ready to be reviewed and merged.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Comment validation errors
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## ❌ Release Validation Failed
            
            The release PR did not pass all validations. Please check the workflow logs for errors.
            
            ### Steps to fix:
            
            1. Verify the PR title is a valid version number (e.g.: v2.3.1)
            2. Ensure versions in \`manifest.json\` and \`pyproject.toml\` match
            3. Verify the version in files matches the PR title
            4. Confirm the new version is greater than the latest published version
            
            Check the workflow logs for more details.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

